name: CI/CD Docker

on:
  push:
    branches: [main, backend, frontend]
    # Chỉ kích hoạt khi có thay đổi trong các thư mục liên quan
    paths:
      - 'mini_project/**'
      - 'mini-hrm-fe/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login Docker Hub (Đảm bảo bạn đã cài đặt DOCKER_USERNAME và DOCKER_PASSWORD trong Secrets)
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & push backend image
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          # Ngữ cảnh build bao gồm cả thư mục code và thư mục docker
          context: ./mini_project
          # Sửa lỗi: Chỉ định chính xác đường dẫn đến Dockerfile của Backend
          file: ./mini_project/docker/php/Dockerfile
          push: true
          tags: quangnam2512/mini-hrm:backend-latest

      # Build & push frontend image
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./mini-hrm-fe
          # Mặc định tìm Dockerfile tại mini-hrm-fe/Dockerfile
          file: ./mini-hrm-fe/Dockerfile
          push: true
          tags: quangnam2512/mini-hrm:frontend-latest
