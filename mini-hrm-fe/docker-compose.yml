services:
  frontend:
    build: .
    image: mini-hrm-frontend
    hostname: localhost
    restart: unless-stopped
    ports: ["3000:3000"]
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
