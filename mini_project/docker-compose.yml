x-app: &app
  image: mini-hrm-backend
  working_dir: /var/www
  networks: [backend]
  env_file: ./laravel/.env
  restart: unless-stopped

services:
  app:
    <<: *app
    build:
      context: ./laravel
      dockerfile: ../docker/php/Dockerfile
    volumes:
      - ./laravel:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      db: { condition: service_healthy }

  worker:
    <<: *app
    build:
      context: ./laravel
      dockerfile: ../docker/php/Dockerfile
    volumes:
      - ./laravel:/var/www
    depends_on: [app, db]
    command: php artisan queue:work --sleep=3 --tries=3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["8000:80"]
    volumes:
      - ./laravel:/var/www:ro
      - ./docker/nginx/nginx-mini-project-be.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [backend]
    depends_on: [app]

  db:
    image: mysql:8.0
    restart: unless-stopped
    ports: ["33061:3306"]
    environment:
      MYSQL_DATABASE: mini_project
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
    volumes: [mysql-data:/var/lib/mysql]
    networks: [backend]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    networks: [backend]

networks:
  backend:

volumes:
  mysql-data:
  redis-data:
